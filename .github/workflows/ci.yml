name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby for YAML validation
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"

      - name: Install backend dependencies
        working-directory: backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Validate Docker Compose config
        run: docker compose config

      - name: Validate Kubernetes YAML syntax
        run: ruby -e 'require "yaml"; Dir["k8s/*.yml"].sort.each { |file| YAML.load_file(file); puts "valid yaml: #{file}" }'

      - name: Build backend image
        run: docker build -t fullstack-backend:test ./backend

      - name: Build frontend image
        run: docker build -t fullstack-frontend:test ./frontend
