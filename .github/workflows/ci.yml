name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Get code
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t fullstack-backend:test ./backend

      - name: Build frontend image
        run: docker build -t fullstack-frontend:test ./frontend
